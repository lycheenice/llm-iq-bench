title: 长上下文召回与理解
dim: long_context
description: 长文档内信息检索与综合。
datasets: [longbench, needle]
benchmarks: [long_longbench, long_needle, long_needle_stress]
metrics: [f1, exact_match_text]
runners: [needle_gen]
default_params: {temperature: 0, max_tokens: 256}
prompt_templates: [long_qa]
scoring: Needle 召回率（EM）；LongBench/RULER 综合 F1/EM。
notes:
  - 按模型上下文长度自适应调整文档规模，报告实际 token 数。
  - Needle 测试需把"针"插入不同深度/位置多次取平均。
  - RULER 可作为更长、更难变体补充。
