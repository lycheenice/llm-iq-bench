title: 多语言
dim: multilingual
description: 非英文场景下的推理与理解能力。
datasets: [mgsm]
benchmarks: [multilingual_mgsm]
metrics: [exact_match_numeric]
default_params: {temperature: 0, max_tokens: 512}
prompt_templates: [reasoning_qa]
scoring: 与对应英文基准同口径（MGSM 用 accuracy）。
notes:
  - 可扩展 MultiNLI / xcopa / 多语言 MMLU 覆盖更多语种。
  - 报告时按语种分组，避免被高资源语言掩盖低资源短板。
